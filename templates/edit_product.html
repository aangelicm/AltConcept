{% extends "base.html" %}

{% block title %}Редактировать - AltConcept{% endblock %}

{% block content %}
<h2>✏️ Редактирование товара</h2>

<form class="form-box mt-2" action="/seller/product/edit/{{ product.id }}" method="POST">
    <label>Название</label>
    <input type="text" name="name" value="{{ product.name }}" required>
    
    <label>Описание</label>
    <textarea name="description" rows="4">{{ product.description }}</textarea>
    
    <label>Цена (₽)</label>
    <input type="number" name="price" value="{{ product.price }}" step="0.01" min="0" required>
    
    <div style="display:flex;gap:1rem;margin-top:1rem">
        <button type="submit" class="btn">💾 Сохранить</button>
        <a href="/seller/dashboard" class="btn secondary">Отмена</a>
    </div>
</form>

{% if product.image %}
<p class="mt-2"><strong>Текущее изображение:</strong></p>
<img src="{{ product.image }}" style="max-width:200px;border-radius:4px">
{% endif %}
{% endblock %}
