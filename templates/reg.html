<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Работяги</title>
  <link rel="stylesheet" href="VSC/gren.jpg" type="image/x-icon">
  <style>
    
    h1{
      text-align: center;
      color: #ffffff;

    }
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: #4A90E2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
}

.login-box {
    background: #d5dad8;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    text-align: center;
}

.logo-icon {
    font-size: 40px;
    margin-bottom: 10px;
}

.logo h1 {
    font-size: 24px;
    color: #333;
    font-weight: 700;
}

h2 {
    font-size: 20px;
    margin-bottom: 8px;
    color: #222;
}

p {
    color: #666;
    font-size: 14px;
    margin-bottom: 30px;
}

.input-group {
    text-align: left;
    margin-bottom: 20px;
}

.role-selection {
    display: flex;
    justify-content: space-around;
    margin: 15px 0;
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #333;
}

.role-selection label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px; 
}

.role-selection input[type="radio"] {
    accent-color: #007bff; 
}

.input-group label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: #555;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ffffff;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
}

.input-group input:focus {
    border-color: #000000;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

.login-btn:hover {
    background-color: #020207;
}

.footer-links {
    margin-top: 25px;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: center;
}

.footer-links a {
    color: #007bff;
    text-decoration: none;

}

.footer-links a:hover {
    text-decoration: underline;
}

  </style>
</head>
<body>
<header>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
  <h1>SkySparkles</h1>
    <div class="login-container">
        <div class="login-box">
          
            <h2>Регистрация</h2>
            <form>
                <div class="input-group">
                    <label for="login-box"></label>
                    <input type="text" id="login" placeholder="Логин" required>
                </div>
                <div class="input-group">
                    <label for="login-box"></label>
                    <input type="email" id="email" placeholder="@gmail.com" required>
                </div>
                <div class="input-group">
                    <label for="password"></label>
                    <input type="password" id="password" placeholder="Пароль" required>
                    <div class="role-selection">
                <div class="role-selection">
                    <label>
                        <input type="radio" name="role" value="buyer" checked>
                        Покупатель
                    </label>
                    <label>
                        <input type="radio" name="role" value="seller">
                        Продавец
                    </label>
                </div>
                </div>
                <button type="submit" class="login-btn" href="Untitled-7.html" >Создать</button>
            </form>

            <div class="footer-links">
                <span><a href="help.html">Помощь?</a></span>
            </div>
        </div>
    </div>
</body>
</html>

</body>
</html>
